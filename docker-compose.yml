services:
  postgres:
    image: postgres:16
    container_name: cafe_postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend        # ← tell Docker to look inside backend/
      dockerfile: Dockerfile
    container_name: cafe_backend
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./backend/.env          # ← point to backend's .env
    ports:
      - "${PORT}:${PORT}"
    volumes:
      - ./backend/uploads:/app/uploads

volumes:
  postgres_data: